# No hay recargas en caliente de los valores de configmap por env
# Las cargas de data de configmaps se generan en la creación del recurso por defecto
apiVersion: v1
kind: Pod
metadata:
  name: pod-configmap
spec:
  containers:
    - name: app
      image: busybox
      command:
        ["sh", "-c", "while true; do echo $MENSAJE - $CURSO; sleep 5; done"]
      env:
        - name: MENSAJE
          valueFrom:
            configMapKeyRef:
              name: mensaje-config
              key: MENSAJE
        - name: CURSO
          valueFrom:
            configMapKeyRef:
              name: mensaje-config
              key: CURSO
