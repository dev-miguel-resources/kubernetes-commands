# Ejercicio 1: Donde todo funciona bien
# Resultado esperado: running
apiVersion: v1
kind: Pod
metadata:
  name: pod-requests
  labels:
    name: requests-limits
spec:
  containers:
    - name: nginx
      image: nginx
      resources:
        requests:
          # Si el nodo a asignar no contiene lo mínimo exigible elige otro.
          memory: "100Mi" # -> Solicita 100 MiB de RAM.
          cpu: "100m" # -> Solicita 100 milicores de CPU (equivale al 10% de 1 CPU).
        limits:
          # 2^10 = 1024
          # 1ki = 1024 bytes
          # 1Mi = 1024 Ki
          # 1Gi = 1024 Mi
          # Kubernetes trabaja en binario para la memoria, no en decimal.
          memory: "500Mi" # -> El contenedor no podrá usar más de 500 MiB.
          # La CPU si trabaja en decimal = base 1000
          # m = milicores
          cpu: "200m" # -> No puede usar más del 20% de un CPU.
          # Si un nodo no dispone simultáneamente de los recursos mínimos
          # definidos en requests, Kubernetes intentará programar el Pod
          # en otro nodo que sí cumpla con todos los requisitos.
          # Si no hay nodos que lo puedan recibir queda en pending. Pero si
          # hay otro nodo disponible de recursos lo puede recibir.
          # Si alguno de los 2 recursos no cumple, no lo hace ninguno, el pod no se puede programar.
      ports:
        - containerPort: 80
